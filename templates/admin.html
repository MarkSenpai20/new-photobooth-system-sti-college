<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth Admin</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { padding: 10px 15px; background: #3498db; color: #fff; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #2980b9; }
        
        /* Editor Modal */
        #editorModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; }
        #editorModal.active { display: flex; }
        .editor-tools { background: #333; padding: 10px; color: white; display: flex; gap: 10px; align-items: center; }
        .canvas-container { flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; padding: 20px; }
        canvas { background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAMUlEQVQ4T2NkYGAQYcAP3hNUIKxgYWA4z4ADUDSiAEMwYNAhAANs4sMMQAYMhmOQjAAAcOch8b9N33cAAAAASUVORK5CYII=') repeat; cursor: crosshair; max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .slot-panel { background: #222; padding: 10px; color: white; width: 300px; overflow-y: auto;}
        .slot-item { background: #444; margin-bottom: 10px; padding: 10px; border-radius: 4px; }
        .slot-item h4 { margin: 0 0 5px 0; }
        .slot-item select { width: 100%; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ Photobooth Admin Dashboard</h1>
        
        <div class="card">
            <h2>1. Upload External Template</h2>
            <input type="file" id="templateFile" accept="image/png">
            <button onclick="uploadTemplate()">Upload Template</button>
        </div>

        <div class="card">
            <h2>2. Create Plain Template</h2>
            <div style="display: flex; gap: 20px; align-items: flex-start;">
                <div style="flex: 1;">
                    <label>Name (e.g. 4_strip_classic):</label><br>
                    <input type="text" id="plainName" style="margin-bottom:10px; width:100%; padding:5px;"><br>
                    
                    <label>Width (px):</label><br>
                    <input type="number" id="plainWidth" value="600" oninput="updatePlainPreview()" style="margin-bottom:10px; width:100%; padding:5px;"><br>
                    
                    <label>Height (px):</label><br>
                    <input type="number" id="plainHeight" value="1800" oninput="updatePlainPreview()" style="margin-bottom:10px; width:100%; padding:5px;"><br>
                    
                    <button onclick="createPlainTemplate()" style="background:#27ae60; margin:0; width:100%;">Create Template</button>
                </div>
                
                <!-- Live Preview Box -->
                <div style="width: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <div style="margin-bottom: 5px; font-size: 12px; color: #555;">Live Shape Preview</div>
                    <div style="width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; background: #e0e0e0; border-radius: 8px; border: 1px dashed #aaa;">
                        <div id="plainPreviewBox" style="background: white; border: 2px solid #333; box-shadow: 0 4px 8px rgba(0,0,0,0.2);"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>3. Active Settings</h2>
            <label>Select Default Active Template:</label>
            <select id="templateSelect"></select>
            <button onclick="openEditor()">✏️ Edit Layout</button>
            <br><br>
            <label>Prints per page:</label>
            <input type="number" id="copies" min="1" max="4" value="2">
            <br><br>
            <label>
                <input type="checkbox" id="autoPrint"> Enable Auto-Print (Windows only)
            </label>
            <br><br>
            <button onclick="saveSettings()">Save Settings</button>
        </div>
        
        <div class="card">
            <a href="/" target="_blank">Launch Customer Kiosk</a>
        </div>
    </div>

    <!-- Editor Modal -->
    <div id="editorModal">
        <div class="editor-tools">
            <button onclick="closeEditor()" style="background:#e74c3c;">Close</button>
            <button onclick="saveLayout()" style="background:#2ecc71;">Save Config</button>
            <button id="drawModeBtn" onclick="toggleDrawMode()" style="background:#9b59b6;">Draw Polygon Mask</button>
            <button onclick="addSlot()">+ Add 4-Point Slot</button>
            <div style="margin-left:20px; display:flex; gap:2px; background:#444; padding:2px; border-radius:4px;">
                <button onclick="nudgeActiveSlot(0, -1)" title="Nudge Up">⬆️</button>
                <button onclick="nudgeActiveSlot(0, 1)" title="Nudge Down">⬇️</button>
                <button onclick="nudgeActiveSlot(-1, 0)" title="Nudge Left">⬅️</button>
                <button onclick="nudgeActiveSlot(1, 0)" title="Nudge Right">➡️</button>
            </div>
            <span style="margin-left: 10px; font-size:12px;">Drag corners/edges to map perspective. Drag center to move shape. Or use Arrow Keys.</span>
        </div>
        <div style="display: flex; flex: 1; overflow: hidden;">
            <div class="canvas-container">
                <canvas id="editorCanvas"></canvas>
            </div>
            <div class="slot-panel" id="slotPanel">
                <!-- Slots render here -->
            </div>
        </div>
    </div>

    <script src="/static/admin.js"></script>
</body>
</html>
